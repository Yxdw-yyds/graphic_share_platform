<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户主页 - αcFun</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: var(--background-color);
      color: var(--text-main);
    }
    .topbar {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-color);
      cursor: pointer;
    }
    .wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .profile-card {
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      display: flex;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }
    .avatar {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      background: #e8f5fd;
    }
    .profile-main h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .profile-meta {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }
    .work-card {
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 20px;
      margin-bottom: 16px;
    }
    .work-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .work-summary {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #273340;
    }
    .work-img {
      width: 100%;
      max-height: 420px;
      object-fit: cover;
      border-radius: var(--radius-md);
      margin-top: 14px;
      display: block;
      cursor: zoom-in;
    }
    .work-image-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .work-image-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: var(--radius-md);
      display: block;
      cursor: zoom-in;
    }
    .work-meta {
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .section-title {
      margin: 20px 0 12px;
      font-size: 20px;
      font-weight: 900;
    }
    .collection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .collection-card {
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .collection-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }
    .collection-meta, .collection-link {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }
    .collection-link {
      color: var(--primary-color);
      font-weight: 800;
      cursor: pointer;
    }
    .work-card {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" onclick="window.location.href='index.html'">αcFun</div>
    <button class="acf-btn" onclick="history.back()">返回</button>
  </header>

  <main class="wrap">
    <section class="profile-card" id="profile-card">
      <div class="acf-skeleton acf-skeleton-card" style="width:100%;"></div>
    </section>
    <section id="collections-section"></section>
    <section id="works-list"></section>
  </main>

  <script src="assets/components.js"></script>
  <script src="api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const userId = Number(params.get('id'));
    const initialCollectionId = Number(params.get('collection'));
    let publicCollections = [];
    let publicWorks = [];

    function renderWorkImages(work) {
      const images = normalizeWorkImages(work);
      if (!images.length) return '';
      if (images.length === 1) {
        return `<img class="work-img" src="${images[0]}" alt="${work.title}" ${lightboxImageAttrs(images, 0)}>`;
      }
      return `<div class="work-image-grid">${images.map((src, index) => `<img src="${src}" alt="${work.title}" ${lightboxImageAttrs(images, index)}>`).join('')}</div>`;
    }

    function renderProfile(user) {
      const avatar = user.avatar_url || `https://api.dicebear.com/7.x/thumbs/svg?seed=${encodeURIComponent(user.nickname || user.account)}`;
      document.getElementById('profile-card').innerHTML = `
        <img class="avatar" src="${avatar}" alt="${user.nickname || user.account}">
        <div class="profile-main">
          <h1>${user.nickname || user.account}</h1>
          <div class="profile-meta">
            <div>用户ID：${user.id}</div>
            <div>账号：${user.account}</div>
            <div>创作等级：${user.creator_level} / 热度 ${user.heat_score}</div>
            <div>个人简介：${user.bio || '这个用户还没有填写简介'}</div>
          </div>
        </div>
      `;
    }

    function renderCollections(collections) {
      const box = document.getElementById('collections-section');
      if (!collections.length) {
        box.innerHTML = '';
        return;
      }
      box.innerHTML = `
        <div class="section-title">合集和系列</div>
        <div class="collection-grid">
          ${collections.map(c => `
            <div class="collection-card" onclick="renderCollectionDetail(${c.id})">
              <strong>${c.title}</strong>
              <div class="collection-meta">${c.description || '暂无简介'}</div>
              <div class="collection-meta">${(c.items || []).length} 个内容 · ${new Date(c.updated_at).toLocaleDateString()}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function collectionLinksForWork(workId) {
      const hits = publicCollections.filter(c => (c.items || []).some(item => Number(item.work_id) === Number(workId)));
      if (!hits.length) return '';
      return `<span>所属合集：${hits.map(c => `<span class="collection-link" onclick="event.stopPropagation(); renderCollectionDetail(${c.id})">${c.title}</span>`).join('、')}</span>`;
    }

    function renderWorks(works, title = '公开动态') {
      const box = document.getElementById('works-list');
      if (!works.length) {
        box.innerHTML = acf.emptyState({ title: '暂无公开图文', description: '该用户还没有已审核通过的作品' });
        return;
      }
      box.innerHTML = `<div class="section-title">${title}</div>` + works.map(w => `
        <article class="work-card" onclick="renderWorkDetail(${w.id})">
          <div class="work-title">#${w.category} ${w.title}</div>
          <div class="work-summary">${w.summary || ''}</div>
          ${renderWorkImages(w)}
          <div class="work-meta">
            <span>${new Date(w.created_at).toLocaleString()}</span>
            <span>${w.like_count || 0} 点赞</span>
            <span>${w.favorite_count || 0} 收藏</span>
            <span>${w.comment_count || 0} 评论</span>
            <span>热度 ${Math.round(w.heat || 0)}</span>
            ${collectionLinksForWork(w.id)}
          </div>
        </article>
      `).join('');
    }

    function renderCollectionDetail(collectionId) {
      const collection = publicCollections.find(c => Number(c.id) === Number(collectionId));
      if (!collection) return;
      const works = (collection.items || []).map(item => item.work).filter(Boolean);
      document.getElementById('collections-section').innerHTML = `
        <div class="collection-card" style="cursor:default;">
          <div class="collection-link" onclick="renderCollections(publicCollections); renderWorks(publicWorks);">返回全部合集</div>
          <h2>${collection.title}</h2>
          <div class="collection-meta">${collection.description || '暂无简介'}</div>
          <div class="collection-meta">${works.length} 个内容</div>
        </div>
      `;
      renderWorks(works, '合集内容');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderWorkDetail(workId) {
      const work = publicWorks.find(w => Number(w.id) === Number(workId))
        || publicCollections.flatMap(c => c.items || []).map(item => item.work).find(w => Number(w?.id) === Number(workId));
      if (!work) return;
      document.getElementById('collections-section').innerHTML = `
        <div class="collection-card" style="cursor:default;">
          <span class="collection-link" onclick="renderCollections(publicCollections); renderWorks(publicWorks);">返回主页内容</span>
        </div>
      `;
      document.getElementById('works-list').innerHTML = `
        <article class="work-card" style="cursor:default;">
          <div class="work-title">#${work.category} ${work.title}</div>
          <div class="work-summary">${work.summary || ''}</div>
          ${renderWorkImages(work)}
          <div class="work-meta">
            <span>${new Date(work.created_at).toLocaleString()}</span>
            <span>${work.like_count || 0} 点赞</span>
            <span>${work.favorite_count || 0} 收藏</span>
            <span>${work.comment_count || 0} 评论</span>
            <span>热度 ${Math.round(work.heat || 0)}</span>
            ${collectionLinksForWork(work.id)}
          </div>
        </article>
      `;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function init() {
      if (!userId) {
        document.getElementById('profile-card').innerHTML = '<div style="color:#e0245e;">用户ID无效</div>';
        return;
      }
      try {
        const [user, works, collections] = await Promise.all([
          apiFetch(`/api/users/${userId}`, { silent: true }),
          apiFetch(`/api/users/${userId}/works`, { silent: true }),
          apiFetch(`/api/users/${userId}/collections`, { silent: true })
        ]);
        publicWorks = Array.isArray(works) ? works : (works.items || []);
        publicCollections = Array.isArray(collections) ? collections : [];
        renderProfile(user);
        renderCollections(publicCollections);
        if (initialCollectionId && publicCollections.some(c => Number(c.id) === initialCollectionId)) {
          renderCollectionDetail(initialCollectionId);
        } else {
          renderWorks(publicWorks);
        }
      } catch (err) {
        document.getElementById('profile-card').innerHTML = `<div style="color:#e0245e;">${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
